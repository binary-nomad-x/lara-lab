services:
  # Aapki Laravel App
  app:
    build: .
    container_name: laravel_app
    volumes:
      - .:/var/www/html
    networks:
      - laravel_net

  # Web Server (Nginx)
  nginx:
    image: nginx:trixie-perl
    container_name: laravel_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_net

  # Database
  db:
    image: mysql:latest
    container_name: laravel_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
    networks:
      - laravel_net

  # Redis
  redis:
    image: redis:latest
    container_name: laravel_redis
    networks:
      - laravel_net

  # Mailpit
  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel_mail
    ports:
      - "8025:8025"
    networks:
      - laravel_net

networks:
  laravel_net:
    driver: bridge
